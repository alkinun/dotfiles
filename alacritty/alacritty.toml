[window]
padding = { x = 10, y = 10 }
decorations = "none"
opacity = 1.0

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
size = 9

[colors.primary]
background = "#1a1a1a"
foreground = "#d8dee9"

[colors.normal]
black   = "#2e3440"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#88c0d0"
white   = "#e5e9f0"

[colors.bright]
black   = "#4c566a"
red     = "#bf616a"
green   = "#a3be8c"
yellow  = "#ebcb8b"
blue    = "#81a1c1"
magenta = "#b48ead"
cyan    = "#8fbcbb"
white   = "#eceff4"

[cursor]
style = { shape = "Block", blinking = "Off" }

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "Left", mods = "Control", chars = "\u001bb" },
  { key = "Right", mods = "Control", chars = "\u001bf" },
]

[terminal.shell]
program = "/usr/bin/zsh"
