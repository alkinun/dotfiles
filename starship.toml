# ~/.config/starship.toml — Rose Pine

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "fg:#ebbcba bold"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$symbol$branch]($style)"
symbol = " "
style = "fg:#c4a7e7"

[git_status]
format = '([ $all_status$ahead_behind]($style))'
style = "fg:#eb6f92"
conflicted = "⚡"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "⬆${ahead_count}⬇${behind_count}"
modified = "!"
untracked = "?"
staged = "+"
deleted = "✘"

[cmd_duration]
format = " [ $duration]($style)"
style = "fg:#f6c177"
min_time = 2_000

[character]
success_symbol = "[❯](fg:#9ccfd8)"
error_symbol   = "[❯](fg:#eb6f92)"
